{% extends "admin/index.html" %}

{% block content %}
<!-- Analytics shortcut banner -->
<div style="
  background: linear-gradient(135deg, #5e5ce6 0%, #a78bfa 100%);
  border-radius: 14px;
  padding: 20px 28px;
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: 0 4px 20px rgba(94,92,230,0.25);
">
  <div>
    <p style="margin:0; font-size:1.1rem; font-weight:700; color:#fff; letter-spacing:-0.03em;">
      📊 SpendWise Analytics
    </p>
    <p style="margin:4px 0 0; font-size:0.84rem; color:rgba(255,255,255,0.80);">
      View user enrollment charts, transaction graphs, and spending breakdowns
    </p>
  </div>
  <a href="/admin/analytics/"
     style="
       background: rgba(255,255,255,0.20);
       border: 1px solid rgba(255,255,255,0.40);
       color: #fff;
       padding: 10px 22px;
       border-radius: 10px;
       text-decoration: none;
       font-weight: 700;
       font-size: 0.88rem;
       white-space: nowrap;
       transition: background 0.15s;
     "
     onmouseover="this.style.background='rgba(255,255,255,0.30)'"
     onmouseout="this.style.background='rgba(255,255,255,0.20)'"
  >
    View Analytics →
  </a>
</div>

{{ block.super }}
{% endblock %}
