{% extends "admin/index.html" %}

{% block content %}
<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px;margin-bottom:24px;">
  <div style="
    background: linear-gradient(135deg, #5e5ce6 0%, #a78bfa 100%);
    border-radius: 14px;
    padding: 20px 22px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    box-shadow: 0 4px 20px rgba(94,92,230,0.25);
  ">
    <div>
      <p style="margin:0; font-size:1.1rem; font-weight:700; color:#fff; letter-spacing:-0.03em;">
        SpendWise Analytics
      </p>
      <p style="margin:4px 0 0; font-size:0.84rem; color:rgba(255,255,255,0.80);">
        View users, visits, transactions, and spending breakdowns.
      </p>
    </div>
    <a href="/admin/analytics/"
       style="background:rgba(255,255,255,0.20);border:1px solid rgba(255,255,255,0.40);color:#fff;padding:10px 18px;border-radius:10px;text-decoration:none;font-weight:700;font-size:0.88rem;white-space:nowrap;">
      View
    </a>
  </div>

  <div style="
    background: linear-gradient(135deg, #16a34a 0%, #0ea5e9 100%);
    border-radius: 14px;
    padding: 20px 22px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    box-shadow: 0 4px 20px rgba(14,165,233,0.22);
  ">
    <div>
      <p style="margin:0; font-size:1.1rem; font-weight:700; color:#fff; letter-spacing:-0.03em;">
        Send User Message
      </p>
      <p style="margin:4px 0 0; font-size:0.84rem; color:rgba(255,255,255,0.82);">
        Broadcast an email announcement to all active users.
      </p>
    </div>
    <a href="/admin/broadcast/"
       style="background:rgba(255,255,255,0.20);border:1px solid rgba(255,255,255,0.40);color:#fff;padding:10px 18px;border-radius:10px;text-decoration:none;font-weight:700;font-size:0.88rem;white-space:nowrap;">
      Send
    </a>
  </div>
</div>

{{ block.super }}
{% endblock %}
