{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SpendWise – Sign Up</title>
  <link rel="stylesheet" href="{% static 'login/auth.css' %}" />
</head>
<body>
  <div class="desktop-layout">

    <!-- Left panel -->
    <div class="left-panel">
      <h1 class="brand-large">spendwise</h1>
      <p class="brand-tagline">Join thousands managing<br/>their finances smarter.</p>
      <div class="left-orbs" aria-hidden="true">
        <div class="lo lo-1"></div>
        <div class="lo lo-2"></div>
        <div class="lo lo-3"></div>
        <div class="lo lo-4"></div>
        <div class="lo lo-5"></div>
      </div>
    </div>

    <!-- Right panel / card -->
    <div class="right-panel">
      <div class="card card-form">

        <span class="brand">spendwise</span>

        <h2 class="form-title">Sign Up</h2>
        <p class="form-sub">Create a new account</p>

        <form method="post" action="#" class="auth-form" novalidate>
          {% csrf_token %}

          <div class="field-group">
            <span class="field-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
            </span>
            <input type="text" name="name" placeholder="Enter your name" class="field-input" autocomplete="name" />
          </div>

          <div class="field-group">
            <span class="field-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
                <rect x="2" y="4" width="20" height="16" rx="2"/>
                <path d="m2 7 10 7 10-7"/>
              </svg>
            </span>
            <input type="email" name="email" placeholder="Enter your email" class="field-input" autocomplete="email" />
          </div>

          <div class="field-group">
            <span class="field-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
                <rect x="3" y="11" width="18" height="11" rx="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
            </span>
            <input type="password" name="password" placeholder="Create a password" class="field-input" autocomplete="new-password" />
          </div>

          <button type="submit" class="cta-btn">Sign Up &rarr;</button>
        </form>

        <p class="terms-copy">
          By signing up you agree to our
          <a href="#" class="link-accent">Terms of Service</a> and
          <a href="#" class="link-accent">Privacy Policy</a>
        </p>

        <p class="footer-copy">
          Already have an account?
          <a href="/login/" class="link-accent">Sign in</a>
        </p>

        <hr class="divider" />

        <p class="footer-copy muted">
          Don't have an account? <a href="#" class="link-accent">Save</a>
        </p>

      </div>
    </div>

  </div>
</body>
</html>
