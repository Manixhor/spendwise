{% load static %}
<aside class="sidebar">
  <div class="avatar-wrap">
    <a href="{% url 'profile' %}" class="avatar-link" title="Edit Profile">
      {% if profile.avatar %}
        <img src="{{ profile.avatar.url }}" alt="{{ user.first_name|default:user.username }}" class="avatar" />
      {% else %}
        <div class="avatar-initials" aria-label="{{ user.get_full_name|default:user.username }}">
          {{ user.first_name|slice:":1"|upper }}{{ user.last_name|slice:":1"|upper }}{% if not user.first_name %}{{ user.username|slice:":2"|upper }}{% endif %}
        </div>
      {% endif %}
    </a>
    <!-- <span class="avatar-dot"></span> -->
  </div>
  <nav class="nav-icons">
    <a href="{% url 'dashboard' %}" class="nav-icon {% if active_nav == 'dashboard' %}active{% endif %}" aria-label="Dashboard" title="Dashboard">
      <svg viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
    </a>
    <a href="{% url 'monthly' %}" class="nav-icon {% if active_nav == 'monthly' %}active{% endif %}" aria-label="Monthly Analysis" title="Monthly Analysis">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <rect x="3" y="4" width="18" height="18" rx="2"/>
        <path d="M16 2v4M8 2v4M3 10h18"/>
        <path d="M8 14h.01M12 14h.01M16 14h.01M8 18h.01M12 18h.01M16 18h.01"/>
      </svg>
    </a>
    <a href="{% url 'savings' %}" class="nav-icon {% if active_nav == 'savings' %}active{% endif %}" aria-label="Savings Goals" title="Savings Goals">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/>
        <path d="M12 6v6l4 2"/>
      </svg>
    </a>
    <form method="post" action="{% url 'logout' %}" class="logout-form">
      {% csrf_token %}
      <button type="submit" class="nav-icon" aria-label="Logout" title="Logout">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </form>
  </nav>
  <div class="sidebar-theme" role="group" aria-label="Theme">
    <button class="theme-btn" type="button" data-theme-value="light" aria-label="Light mode" title="Light mode">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
        <circle cx="12" cy="12" r="4.5"/>
        <path d="M12 2.5v2.2M12 19.3v2.2M4.9 4.9l1.6 1.6M17.5 17.5l1.6 1.6M2.5 12h2.2M19.3 12h2.2M4.9 19.1l1.6-1.6M17.5 6.5l1.6-1.6"/>
      </svg>
      <span class="sr-only">Light</span>
    </button>
    <button class="theme-btn" type="button" data-theme-value="dark" aria-label="Dark mode" title="Dark mode">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
        <path d="M20 15.2A8.5 8.5 0 1 1 8.8 4a7 7 0 0 0 11.2 11.2Z"/>
      </svg>
      <span class="sr-only">Dark</span>
    </button>
  </div>
</aside>
<script>
  (() => {
    const storageKey = 'spendwise-theme';
    const body = document.body;
    const buttons = document.querySelectorAll('.theme-btn');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

    function updateButtons(theme) {
      buttons.forEach((button) => {
        const isActive = button.dataset.themeValue === theme;
        button.classList.toggle('active', isActive);
        button.setAttribute('aria-pressed', String(isActive));
      });
    }

    function updateThemeColor(theme) {
      const color = theme === 'dark' ? '#0b1020' : '#e8e8ed';
      document.querySelectorAll('meta[name="theme-color"]').forEach((meta) => {
        meta.setAttribute('content', color);
      });
    }

    function applyTheme(theme, persist = true) {
      body.setAttribute('data-theme', theme);
      updateButtons(theme);
      updateThemeColor(theme);
      if (persist) {
        window.localStorage.setItem(storageKey, theme);
      }
    }

    const savedTheme = window.localStorage.getItem(storageKey);
    applyTheme(savedTheme || (prefersDark ? 'dark' : 'light'), false);

    buttons.forEach((button) => {
      button.addEventListener('click', () => applyTheme(button.dataset.themeValue));
    });
  })();
</script>
