{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SpendWise – Welcome</title>
  <link rel="stylesheet" href="{% static 'login/auth.css' %}" />
</head>
<body>
  <div class="desktop-layout">

    <!-- Left panel -->
    <div class="left-panel">
      <h1 class="brand-large">spendwise</h1>
      <p class="brand-tagline">Your money, your rules.<br/>Banking built around you.</p>
      <div class="left-orbs" aria-hidden="true">
        <div class="lo lo-1"></div>
        <div class="lo lo-2"></div>
        <div class="lo lo-3"></div>
        <div class="lo lo-4"></div>
        <div class="lo lo-5"></div>
      </div>
    </div>

    <!-- Right panel / card -->
    <div class="right-panel">
      <div class="card">

        <span class="brand">spendwise</span>

        <div class="hero-art" aria-hidden="true">
          <div class="orb orb-large"></div>
          <div class="orb orb-top"></div>
          <div class="orb orb-left"></div>
          <div class="orb orb-right"></div>
        </div>

        <p class="eyebrow">CONTROL YOUR BUDGET</p>

        <h2 class="hero-title">
          Bank made by<br/>
          users for <span class="accent">people</span>.
        </h2>

        <p class="subcopy">
          Track the money you spend with<br/>friends &amp; brands
        </p>

        <div class="social-row" aria-label="Social sign in options">
          <a href="/signup/" class="social-btn" aria-label="Continue with Apple">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M16.72 12.67c.02 2.2 1.93 2.93 1.95 2.94-.02.05-.3 1.03-.99 2.05-.6.88-1.22 1.76-2.2 1.78-.95.02-1.26-.57-2.36-.57-1.1 0-1.44.55-2.34.59-.95.04-1.67-.95-2.27-1.83-1.22-1.76-2.15-4.96-.9-7.13.62-1.08 1.73-1.76 2.93-1.78.92-.02 1.79.62 2.36.62.57 0 1.63-.77 2.75-.66.47.02 1.8.19 2.65 1.43-.07.04-1.58.92-1.56 2.56ZM14.72 5.59c.5-.61.84-1.46.75-2.31-.72.03-1.59.48-2.1 1.08-.46.53-.86 1.39-.75 2.21.8.06 1.6-.41 2.1-.98Z"/>
            </svg>
          </a>
          <a href="/signup/" class="social-btn" aria-label="Continue with Google">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path fill="#EA4335" d="M12.24 10.29v3.93h5.46c-.24 1.27-.98 2.35-2.09 3.07l3.38 2.62c1.97-1.81 3.11-4.48 3.11-7.66 0-.72-.06-1.41-.19-2.08h-9.67Z"/>
              <path fill="#34A853" d="M12.24 20.33c2.77 0 5.1-.92 6.8-2.5l-3.38-2.62c-.94.63-2.13 1.01-3.42 1.01-2.63 0-4.86-1.78-5.66-4.17H3.09v2.7c1.69 3.35 5.15 5.58 9.15 5.58Z"/>
              <path fill="#FBBC05" d="M6.58 12.05a5.98 5.98 0 0 1 0-3.77V5.58H3.09a10.02 10.02 0 0 0 0 9.17l3.49-2.7Z"/>
              <path fill="#4285F4" d="M12.24 8.11c1.51 0 2.87.52 3.93 1.54l2.95-2.95c-1.78-1.68-4.1-2.7-6.88-2.7-4 0-7.46 2.23-9.15 5.58l3.49 2.7c.8-2.39 3.03-4.17 5.66-4.17Z"/>
            </svg>
          </a>
        </div>

        <a href="/signup/" class="cta-btn">Get started &rarr;</a>

        <p class="footer-copy">
          Already have an account? <a href="/login/" class="link-accent">Sign in</a>
        </p>

      </div>
    </div>

  </div>
</body>
</html>
